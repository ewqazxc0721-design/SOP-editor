<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOP模板编辑器</title>
  <link rel="stylesheet" href="./styles.css?v=1.8.7">
</head>
<body>
  <main class="app-shell">
    <aside class="side-toolbar" aria-label="SOP工具栏">
      <div class="toolbar-title">SOP工具栏</div>
      <div class="app-version" id="app-version">应用版本</div>
      <div class="toolbar-section">
        <div class="toolbar-section-title">页面</div>
      <button class="toolbar-button primary" id="add-page" type="button">
        <span class="button-icon">+</span>
        <span>新增页面</span>
      </button>
      <button class="toolbar-button" id="delete-page" type="button">
        <span class="button-icon">×</span>
        <span>删除当前页</span>
      </button>
      <button class="toolbar-button" id="print-pages" type="button">
        <span class="button-icon">PDF</span>
        <span>导出PDF</span>
      </button>
      <button class="toolbar-button" id="batch-print-pages" type="button">
        <span class="button-icon">PDF+</span>
        <span>批量导出PDF</span>
      </button>
      <button class="toolbar-button" id="export-pptx" type="button">
        <span class="button-icon">PPT</span>
        <span>导出PPT</span>
      </button>
      <button class="toolbar-button" id="batch-export-pptx" type="button">
        <span class="button-icon">PPT+</span>
        <span>批量导出PPT</span>
      </button>
      </div>
      <div class="page-count" id="page-count">1 / 1</div>
      <nav class="page-list" id="page-list" aria-label="页面列表"></nav>
    </aside>

    <section class="workspace" aria-label="SOP页面">
      <div class="global-edit-toolbar" aria-label="全局编辑栏">
        <div class="global-color-control" aria-label="预设颜色">
          <span>颜色</span>
          <div class="preset-color-list" id="global-edit-color-presets"></div>
        </div>
        <label class="global-font-control" for="global-edit-font-size">
          <span>字号</span>
          <button class="global-font-step-button" id="global-edit-font-decrease" type="button" aria-label="减小字号">-</button>
          <input id="global-edit-font-size" type="number" min="8" max="96" step="1" inputmode="numeric" aria-label="文字字号" disabled>
          <button class="global-font-step-button" id="global-edit-font-increase" type="button" aria-label="增大字号">+</button>
        </label>
        <button class="global-edit-button" id="global-edit-text" type="button" data-global-action="text">文本框</button>
        <button class="global-edit-button" id="global-edit-bubble" type="button" data-global-action="bubble">气泡文本</button>
        <button class="global-edit-button" id="global-edit-circle" type="button" data-global-action="circle">圆圈</button>
        <button class="global-edit-button" id="global-edit-rect" type="button" data-global-action="rect">矩形框</button>
        <button class="global-edit-button" id="global-edit-arrow" type="button" data-global-action="arrow">箭头</button>
        <button class="global-edit-button danger" id="global-edit-delete" type="button" data-global-action="delete">删除所选</button>
      </div>
      <div class="pages" id="pages"></div>
    </section>

    <aside class="library-panel" aria-label="SOP历史记录">
      <div class="library-header">
        <div class="library-title">
          <strong>SOP库</strong>
          <span id="library-count">0</span>
        </div>
        <button class="library-toggle" id="library-toggle" type="button" aria-label="折叠SOP库" aria-expanded="true">›</button>
      </div>
      <div class="library-section-title">文件</div>
      <div class="library-file-actions">
        <button class="toolbar-button" id="new-file" type="button">
          <span class="button-icon">N</span>
          <span>新建SOP</span>
        </button>
        <button class="toolbar-button" id="open-file" type="button">
          <span class="button-icon">O</span>
          <span>打开SOP</span>
        </button>
        <button class="toolbar-button primary" id="save-file" type="button">
          <span class="button-icon">S</span>
          <span>保存SOP</span>
        </button>
        <button class="toolbar-button" id="save-as-file" type="button">
          <span class="button-icon">AS</span>
          <span>另存为</span>
        </button>
        <button class="toolbar-button" id="create-version" type="button">
          <span class="button-icon">V</span>
          <span>保存版本</span>
        </button>
        <select class="version-select" id="version-select" aria-label="版本历史"></select>
        <div class="file-status" id="file-status">未命名</div>
        <input class="file-input" id="open-project-input" type="file" accept=".sopzip,.sop.json,.json,application/zip,application/json">
      </div>
      <section class="global-info-panel" id="global-info-panel" aria-label="SOP全局信息">
        <div class="library-section-title">全局信息</div>
        <div class="global-info-grid">
          <label class="library-field" for="global-info-product">
            <span>产品名称/编号</span>
            <input id="global-info-product" type="text" data-global-info-key="productName">
          </label>
          <label class="library-field" for="global-info-sop-number">
            <span>SOP编号</span>
            <input id="global-info-sop-number" type="text" data-global-info-key="sopNumber">
          </label>
          <label class="library-field" for="global-info-version">
            <span>版本</span>
            <input id="global-info-version" type="text" data-global-info-key="version">
          </label>
          <label class="library-field" for="global-info-date">
            <span>日期</span>
            <input id="global-info-date" type="text" data-global-info-key="date">
          </label>
          <label class="library-field" for="global-info-author">
            <span>编制</span>
            <input id="global-info-author" type="text" data-global-info-key="author">
          </label>
          <label class="library-field" for="global-info-reviewer">
            <span>审核</span>
            <input id="global-info-reviewer" type="text" data-global-info-key="reviewer">
          </label>
          <label class="library-field" for="global-info-approver">
            <span>批准</span>
            <input id="global-info-approver" type="text" data-global-info-key="approver">
          </label>
        </div>
        <label class="global-info-toggle">
          <input id="global-info-material-table-enabled" type="checkbox" checked>
          <span>启用零件物料/治具表</span>
        </label>
        <div class="global-info-logo-field">
          <div class="global-info-logo-header">
            <span>Logo图片</span>
            <div class="global-info-logo-actions">
              <button class="library-action-button" id="global-info-logo-choose" type="button">插入logo</button>
              <button class="library-action-button danger" id="global-info-logo-delete" type="button">删除</button>
            </div>
          </div>
          <div class="global-info-logo-preview" id="global-info-logo-preview">未设置logo</div>
          <input class="file-input" id="global-info-logo-input" type="file" accept=".ai,.eps,.pdf,.png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp,application/pdf,application/postscript,application/illustrator">
        </div>
        <div class="global-info-actions">
          <button class="library-action-button" id="global-info-read-current" type="button">读取当前页</button>
          <button class="library-action-button primary" id="global-info-save" type="button">保存并同步</button>
        </div>
        <div class="global-info-status" id="global-info-status">仅保存在当前 SOP 中</div>
      </section>
      <div class="library-section-title">电脑文件夹</div>
      <div class="library-actions">
        <button class="library-action-button primary" id="library-pick-folder" type="button">选择文件夹</button>
        <button class="library-action-button" id="library-refresh-folder" type="button">刷新文件夹</button>
        <button class="library-action-button" id="library-new-folder" type="button">新建文件夹</button>
        <button class="library-action-button" id="library-save-current" type="button">保存当前</button>
      </div>
      <section class="cloud-panel is-collapsed" id="feishu-panel">
        <button class="library-collapse-toggle" id="feishu-panel-toggle" type="button" aria-expanded="false" aria-controls="feishu-panel-body">
          <span>飞书云盘</span>
          <span class="collapse-indicator" aria-hidden="true">&gt;</span>
        </button>
        <div class="cloud-panel-body" id="feishu-panel-body" hidden>
          <div class="cloud-config">
            <label class="library-field" for="feishu-proxy-url">
              <span>中转服务地址</span>
              <input id="feishu-proxy-url" type="url" placeholder="http://127.0.0.1:8787">
            </label>
            <label class="library-field" for="feishu-folder-link">
              <span>飞书文件夹链接或Token</span>
              <input id="feishu-folder-link" type="text" placeholder="https://xxx.feishu.cn/drive/folder/...">
            </label>
          </div>
          <div class="library-actions">
            <button class="library-action-button primary" id="feishu-connect" type="button">连接飞书</button>
            <button class="library-action-button" id="feishu-refresh" type="button">刷新云盘</button>
            <button class="library-action-button" id="feishu-new-folder" type="button">新建云盘文件夹</button>
            <button class="library-action-button" id="feishu-disconnect" type="button">断开飞书</button>
          </div>
        </div>
      </section>
      <div class="library-section-title">文件夹</div>
      <div class="folder-list" id="library-folder-list"></div>
      <div class="library-section-title">BOM表</div>
      <div class="library-actions">
        <button class="library-action-button primary" id="bom-pick-file" type="button">选择BOM表</button>
        <button class="library-action-button" id="bom-close-preview" type="button">关闭预览</button>
      </div>
      <input class="file-input" id="bom-file-input" type="file" accept=".xlsx,.xls,.csv,.tsv,.txt,.json,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/csv,application/json">
      <div class="library-section-title">BOM历史记录</div>
      <div class="bom-history-list" id="bom-history-list"></div>
      <div class="library-section-title">SOP历史记录</div>
      <div class="sop-library-list" id="sop-library-list"></div>
      <div class="library-status" id="library-status">电脑文件夹准备中</div>
    </aside>

    <aside class="bom-preview-panel" id="bom-preview-panel" aria-label="BOM表预览" hidden>
      <div class="bom-preview-header">
        <div>
          <strong id="bom-preview-title">BOM表</strong>
          <span id="bom-preview-meta">未加载</span>
        </div>
        <button class="bom-preview-close" id="bom-preview-close" type="button" aria-label="关闭BOM预览">×</button>
      </div>
      <div class="bom-preview-status" id="bom-preview-status">选择或点击一个 BOM 表后，这里会显示预览。</div>
      <div class="bom-preview-table-wrap">
        <table class="bom-preview-table" id="bom-preview-table"></table>
      </div>
    </aside>
  </main>

  <script src="./vendor/xlsx.full.min.js"></script>
  <script src="./vendor/jszip.min.js"></script>
  <script src="./app.js?v=1.8.7"></script>
</body>
</html>
